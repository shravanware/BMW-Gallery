<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BMW Gallery</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header>

        <div class="top_header">

            <img src="./Images/BMW logo.jpg" alt="Logo" class="logo">

            <div>
                <h1>BMW GALLERY</h1>
                <p class="tagline">Luxury • Performance • Innovation</p>
            </div>

            <div class="social-icons">
                <a href="#"><i class="fa-brands fa-square-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook"></i></a>
                <a href="#"><i class="fa-brands fa-apple"></i></a>
            </div>

        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </nav>

    </header>

    <main>

        <section class="content_section">

            <h2>Welcome to Our Page</h2>

            <p>
                Experience the power, elegance, and engineering excellence
                of BMW vehicles.
            </p>

        </section>

        <section class="content_section">

            <h2>Vehicle Gallery</h2>

            <div class="gallery">

                <img src="./Images/BMW logo.jpg" alt="BMW Logo">

                <img src="./Images/black bmw.jpg" alt="Black BMW">

                <img src="./Images/sports bmw.webp" alt="BMW Sports Car">

            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Shravan Ware. All rights reserved.</p>
    </footer>

</body>
</html>
